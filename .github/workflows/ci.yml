name: CI



on:

  push:

    branches: [main, master]

  pull_request:

    branches: [main, master]



jobs:

  build-and-test:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Setup .NET

        uses: actions/setup-dotnet@v4

        with:

          dotnet-version: "10.0.x"



      - name: Restore

        run: dotnet restore HotelSearch.sln



      - name: Build

        run: dotnet build HotelSearch.sln --no-restore -c Release



      - name: Test

        run: dotnet test HotelSearch.sln --no-build -c Release --verbosity normal



      - name: Audit package vulnerabilities

        run: dotnet list HotelSearch.sln package --vulnerable --include-transitive



      - name: Build Docker image

        run: docker compose build

